<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - ZeKids</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            /* ZeKids gradient */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #iframe-container {
            width: 100vh;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>
    <div id="iframe-container">
        <iframe src="../game-2048/index.html"></iframe>
    </div>
    <script>
        let startTime = Date.now();
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.parent.postMessage({
                    type: 'game-complete',
                    data: {
                        score: 0,
                        duration: Math.floor((Date.now() - startTime) / 1000),
                        reactionTimes: [350],
                        rawData: { earlyExit: true }
                    }
                }, '*');
            }
        });
    </script>
</body>
</html>
