<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait Game - ZeKids</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #game-container {
            width: 56.25vh; /* 9:16 aspect ratio */
            height: 100vh;
            max-width: 100%;
            overflow: hidden;
            position: relative;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>
    <div id="game-container">
        <iframe id="game-frame" src="GAME_URL"></iframe>
    </div>
    <script>
        let startTime = Date.now();
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.parent.postMessage({
                    type: 'game-complete',
                    data: {
                        score: 0,
                        duration: Math.floor((Date.now() - startTime) / 1000),
                        reactionTimes: [400],
                        rawData: { earlyExit: true }
                    }
                }, '*');
            }
        });
    </script>
</body>
</html>
