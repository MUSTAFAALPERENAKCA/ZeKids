<!-- TONGUÇ AKADEMİ TARZI - ŞIK OYUN KONSOLU ÇERÇEVESI -->
<div class="h-screen flex flex-col bg-gradient-to-br from-gray-800 via-gray-900 to-black relative overflow-hidden">
  
  <!-- Arka Plan Efektleri -->
  <div class="absolute inset-0 opacity-5">
    <div class="absolute top-20 left-20 w-96 h-96 bg-brand-primary rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute bottom-20 right-20 w-96 h-96 bg-brand-secondary rounded-full blur-3xl animate-pulse" style="animation-delay: 1s;"></div>
  </div>

  <!-- Header - Oyun Konsolu Teması -->
  <div class="relative z-10 bg-gradient-to-r from-gray-800 to-gray-700 border-b-4 border-brand-primary px-8 py-5 flex justify-between items-center shadow-2xl">
    <div class="flex items-center space-x-4">
      <!-- Konsol Göstergesi -->
      <div class="flex space-x-2">
        <div class="w-4 h-4 rounded-full bg-red-500 shadow-lg animate-pulse"></div>
        <div class="w-4 h-4 rounded-full bg-yellow-400 shadow-lg"></div>
        <div class="w-4 h-4 rounded-full bg-green-500 shadow-lg animate-pulse" style="animation-delay: 0.5s;"></div>
      </div>
      
      <!-- Oyun Adı -->
      <div class="flex items-center space-x-3">
        <div class="text-5xl">🎮</div>
        <div>
          <div class="text-xs text-gray-400 font-bold uppercase tracking-wider">Şimdi Oynuyor</div>
          <div class="text-2xl font-black text-white font-display">{{ gameName }}</div>
        </div>
      </div>
    </div>
    
    <!-- Çıkış Butonu -->
    <button 
      (click)="exitGame()"
      class="relative group overflow-hidden"
    >
      <div class="absolute inset-0 bg-gradient-to-r from-red-500 to-red-600 rounded-2xl blur-md opacity-75 group-hover:opacity-100 transition"></div>
      <div class="relative bg-gradient-to-r from-red-500 to-red-600 text-white px-8 py-4 rounded-2xl font-black text-lg shadow-xl hover:scale-105 active:scale-95 transition flex items-center space-x-2">
        <span>🚪</span>
        <span>Çıkış</span>
      </div>
    </button>
  </div>

  <!-- Game Console Frame -->
  <div class="flex-1 relative z-10 p-6">
    <div class="h-full bg-gradient-to-br from-gray-900 to-black rounded-3xl shadow-2xl border-8 border-gray-700 overflow-hidden relative">
      
      <!-- Konsol İç Çerçeve -->
      <div class="absolute inset-4 border-4 border-brand-primary/30 rounded-2xl pointer-events-none z-10"></div>
      
      <!-- Oyun Yüklenirken - Animasyon -->
      <div *ngIf="!gameUrl" class="absolute inset-0 flex flex-col items-center justify-center text-white z-20">
        <div class="text-8xl mb-8 animate-bounce">🎮</div>
        <div class="text-4xl font-black mb-4 font-display">Oyun Yükleniyor...</div>
        <div class="flex space-x-3">
          <div class="w-4 h-4 bg-brand-primary rounded-full animate-bounce"></div>
          <div class="w-4 h-4 bg-brand-secondary rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
          <div class="w-4 h-4 bg-brand-accent rounded-full animate-bounce" style="animation-delay: 0.4s;"></div>
        </div>
      </div>
      
      <!-- Game iframe -->
      <iframe 
        *ngIf="gameUrl"
        [src]="gameUrl"
        class="w-full h-full border-0 relative z-0"
        allow="fullscreen; autoplay; gamepad"
      ></iframe>
    </div>
  </div>

  <!-- Alt Kontrol Paneli - Konsol Butonları -->
  <div class="relative z-10 bg-gradient-to-r from-gray-800 to-gray-700 border-t-4 border-brand-primary px-8 py-4 flex items-center justify-between shadow-2xl">
    <div class="flex items-center space-x-6">
      <!-- Oyun Bilgileri -->
      <div class="flex items-center space-x-3 bg-gray-900/50 px-5 py-3 rounded-2xl border-2 border-brand-primary/30">
        <span class="text-2xl">⏱️</span>
        <div>
          <div class="text-xs text-gray-400 font-bold">Oyun Süresi</div>
          <div class="text-lg font-black text-white">--:--</div>
        </div>
      </div>
      
      <div class="flex items-center space-x-3 bg-gray-900/50 px-5 py-3 rounded-2xl border-2 border-brand-secondary/30">
        <span class="text-2xl">🏆</span>
        <div>
          <div class="text-xs text-gray-400 font-bold">Skor</div>
          <div class="text-lg font-black text-white">---</div>
        </div>
      </div>
    </div>
    
    <!-- Sağ Taraf - Bilgiler -->
    <div class="flex items-center space-x-3">
      <div class="text-xs text-gray-400 font-semibold uppercase tracking-wider">ZeKids Gaming Platform</div>
      <div class="text-2xl">🎯</div>
    </div>
  </div>
</div>
